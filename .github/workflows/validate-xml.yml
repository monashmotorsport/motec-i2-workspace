name: Validate XML Schemas

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.xml'
      - 'schemas/**'
      - 'scripts/validate_xml.py'

jobs:
  validate-xml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lxml

      - name: Run XML validation
        run: python -m scripts.validate_xml
